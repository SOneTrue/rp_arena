version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: rparena_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - sqlite_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: rparena_frontend
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  sqlite_data: